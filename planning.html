<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Randonnées</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }
    header { background: linear-gradient(135deg, #2d6a4f, #52b788); color: #fff; padding: 18px 30px; display: flex; align-items: center; gap: 14px; box-shadow: 0 3px 10px rgba(0,0,0,.2); }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header .icon { font-size: 1.8rem; }
    .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; padding: 0 30px; }
    .tab-btn { padding: 14px 28px; border: none; background: none; font-size: .95rem; font-weight: 600; color: #718096; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
    .tab-btn.active { color: #2d6a4f; border-bottom-color: #2d6a4f; }
    .tab-btn:hover:not(.active) { color: #2d6a4f; background: #f7fafc; }
    .tab-content { display: none; padding: 30px; max-width: 980px; margin: 0 auto; }
    .tab-content.active { display: block; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 28px; margin-bottom: 24px; }
    .card h2 { font-size: 1.1rem; color: #2d6a4f; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: .85rem; font-weight: 600; color: #4a5568; }
    input, select { padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .95rem; transition: border-color .2s; width: 100%; font-family: inherit; }
    input:focus, select:focus { outline: none; border-color: #52b788; }
    .input-unit { position: relative; }
    .input-unit input { padding-right: 42px; }
    .input-unit span { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: .8rem; color: #a0aec0; font-weight: 600; pointer-events: none; }

    /* ── Autocomplétion ── */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1.5px solid #e2e8f0; border-top: none; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; z-index: 50; box-shadow: 0 4px 12px rgba(0,0,0,.1); display: none; }
    .autocomplete-list.open { display: block; }
    .autocomplete-item { padding: 9px 14px; font-size: .88rem; cursor: pointer; border-bottom: 1px solid #f0f4f8; }
    .autocomplete-item:hover, .autocomplete-item.highlighted { background: #f0fff4; color: #2d6a4f; }
    .autocomplete-item:last-child { border-bottom: none; }

    /* ── IBP badge ── */
    .ibp-badge { display: inline-block; margin-top: 6px; padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 700; opacity: 0; transition: opacity .3s; }
    .ibp-badge.visible { opacity: 1; }

    .btn { padding: 10px 22px; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #2d6a4f; color: #fff; } .btn-primary:hover { background: #1b4332; }
    .btn-edit    { background: #3182ce; color: #fff; font-size: .8rem; padding: 5px 10px; } .btn-edit:hover { background: #2c5282; }
    .btn-delete  { background: #e53e3e; color: #fff; font-size: .8rem; padding: 5px 10px; } .btn-delete:hover { background: #c53030; }
    .btn-cancel  { background: #e2e8f0; color: #4a5568; } .btn-cancel:hover { background: #cbd5e0; }
    .btn-load    { background: #52b788; color: #fff; } .btn-load:hover { background: #2d6a4f; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2d6a4f; color: #fff; padding: 12px 26px; border-radius: 30px; font-weight: 600; font-size: .9rem; box-shadow: 0 4px 16px rgba(0,0,0,.2); opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 999; }
    #toast.show { opacity: 1; } #toast.error { background: #e53e3e; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .87rem; }
    thead th { background: #2d6a4f; color: #fff; padding: 10px 12px; text-align: left; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #e2e8f0; } tbody tr:hover { background: #f7fafc; }
    tbody td { padding: 10px 12px; vertical-align: middle; }
    .actions-cell { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { display: inline-block; font-size: .75rem; background: #ebf8ff; color: #2b6cb0; border-radius: 20px; padding: 2px 8px; font-weight: 600; }
    .badge.green { background: #f0fff4; color: #276749; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 30px; width: 520px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .modal h3 { font-size: 1.1rem; color: #2d6a4f; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px; color: #a0aec0; font-style: italic; font-size: .95rem; }
  </style>
</head>
<body>

<header>
  <span class="icon">🏔️</span>
  <h1>Planning Randonnées — La Marmotte</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('creation', this)">➕ Création</button>
  <button class="tab-btn"        onclick="switchTab('gestion', this)">⚙️ Gestion</button>
</div>

<!-- ══ ONGLET CRÉATION ══ -->
<div id="tab-creation" class="tab-content active">
  <div class="card">
    <h2>🆕 Nouvelle randonnée</h2>
    <div class="form-grid">

      <div class="form-group">
        <label for="date">Date *</label>
        <input type="date" id="date" required />
      </div>

      <div class="form-group">
        <label for="animateur-input">Animateur *</label>
        <div class="autocomplete-wrap">
          <input type="text" id="animateur-input" placeholder="Tapez un nom…" autocomplete="off" />
          <div class="autocomplete-list" id="animateur-list"></div>
        </div>
      </div>

      <div class="form-group full">
        <label for="nom-input">Nom de la randonnée *</label>
        <div class="autocomplete-wrap">
          <input type="text" id="nom-input" placeholder="Tapez quelques lettres…" autocomplete="off" />
          <div class="autocomplete-list" id="nom-list"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="ibp">Indice IBP</label>
        <input type="number" id="ibp" placeholder="Ex : 45" min="0" />
        <span class="ibp-badge" id="ibp-badge"></span>
      </div>

      <div class="form-group"><!-- spacer --></div>

      <div class="form-group">
        <label for="distance">Distance</label>
        <div class="input-unit">
          <input type="number" id="distance" placeholder="Ex : 18" min="0" step="0.1" />
          <span>km</span>
        </div>
      </div>

      <div class="form-group">
        <label for="denivele">Dénivelé +</label>
        <div class="input-unit">
          <input type="number" id="denivele" placeholder="Ex : 850" min="0" step="1" />
          <span>m</span>
        </div>
      </div>

    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-create" onclick="creerRando()">➕ Créer l'événement</button>
    </div>
  </div>
</div>

<!-- ══ ONGLET GESTION ══ -->
<div id="tab-gestion" class="tab-content">
  <div class="card">
    <h2>📋 Événements planifiés</h2>
    <div style="margin-bottom:16px">
      <button class="btn btn-load" id="btn-load" onclick="loadEvents()">🔄 Charger les événements</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Randonnée</th><th>Animateur</th>
            <th>IBP</th><th>Distance</th><th>Dénivelé +</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="events-body">
          <tr><td colspan="7" class="empty-state">Cliquez sur "Charger les événements"</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ══ MODAL MODIFIER ══ -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <h3>✏️ Modifier l'événement</h3>
    <input type="hidden" id="edit-rowIndex" />
    <div class="form-grid">
      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="edit-date" />
      </div>
      <div class="form-group">
        <label>Animateur *</label>
        <input type="text" id="edit-animateur" />
      </div>
      <div class="form-group full">
        <label>Nom de la randonnée *</label>
        <input type="text" id="edit-nom" />
      </div>
      <div class="form-group">
        <label>IBP</label>
        <input type="number" id="edit-ibp" min="0" />
      </div>
      <div class="form-group"><!-- spacer --></div>
      <div class="form-group">
        <label>Distance</label>
        <div class="input-unit">
          <input type="number" id="edit-distance" min="0" step="0.1" />
          <span>km</span>
        </div>
      </div>
      <div class="form-group">
        <label>Dénivelé +</label>
        <div class="input-unit">
          <input type="number" id="edit-denivele" min="0" step="1" />
          <span>m</span>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('modal-edit')">Annuler</button>
      <button class="btn btn-primary" id="btn-save-edit" onclick="saveEdit()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkOcGRb6QvmWYZsll4crnH4Al3sIXhfQHdd0YpR3_sB-X0tdP8lhXSPMMuh74UmJ22ag/exec";
const BASE_URL   = "https://dbizcyber.github.io/randoFDR/data/";

let animateurs = [];
let randos     = [];

/* ══ Utilitaires de date ══
   - isoToDisplay : "2025-06-14" → "14/06/2025"  (affichage tableau)
   - displayToIso : "14/06/2025" → "2025-06-14"  (pour <input type=date>)
   - isoToSortKey : retourne la valeur ISO brute pour le tri croissant
*/
function isoToDisplay(iso) {
  if (!iso) return '—';
  // Accepte "YYYY-MM-DD" ou déjà "DD/MM/YYYY"
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(iso)) return iso;
  const parts = iso.split('-');
  if (parts.length !== 3) return iso;
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}

function displayToIso(display) {
  if (!display) return '';
  // Si déjà ISO
  if (/^\d{4}-\d{2}-\d{2}$/.test(display)) return display;
  const parts = display.split('/');
  if (parts.length !== 3) return display;
  return parts[2] + '-' + parts[1] + '-' + parts[0];
}

function dateToSortKey(val) {
  // Normalise n'importe quel format vers YYYY-MM-DD pour le tri
  if (!val) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(val)) {
    const p = val.split('/');
    return p[2] + '-' + p[1] + '-' + p[0];
  }
  return val;
}

/* ══ Chargement des données JSON ══ */
async function loadData() {
  try {
    const [a, r] = await Promise.all([
      fetch(BASE_URL + 'animateurs.json').then(res => res.json()),
      fetch(BASE_URL + 'randos.json').then(res => res.json())
    ]);
    animateurs = a.filter(a => a.nom !== '');
    randos     = r;
    initAutocomplete();
  } catch(e) {
    console.error('Erreur chargement JSON:', e);
  }
}

/* ══ Autocomplétion générique ══ */
function initAutocomplete() {
  setupAutocomplete('animateur-input', 'animateur-list', () => animateurs.map(a => a.nom));
  setupAutocomplete('nom-input', 'nom-list', () => randos);
}

function setupAutocomplete(inputId, listId, getItems) {
  const input = document.getElementById(inputId);
  const list  = document.getElementById(listId);
  let highlighted = -1;

  input.addEventListener('input', () => {
    const filtre = input.value.toLowerCase().trim();
    list.innerHTML = '';
    highlighted = -1;
    if (!filtre) { list.classList.remove('open'); return; }
    const matches = getItems().filter(item => item.toLowerCase().includes(filtre)).slice(0, 10);
    if (!matches.length) { list.classList.remove('open'); return; }
    matches.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'autocomplete-item';
      div.textContent = item;
      div.addEventListener('mousedown', () => { input.value = item; list.classList.remove('open'); });
      list.appendChild(div);
    });
    list.classList.add('open');
  });

  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); highlighted = Math.min(highlighted + 1, items.length - 1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); highlighted = Math.max(highlighted - 1, 0); }
    else if (e.key === 'Enter' && highlighted >= 0) { e.preventDefault(); input.value = items[highlighted].textContent; list.classList.remove('open'); highlighted = -1; return; }
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlighted));
  });

  input.addEventListener('blur', () => setTimeout(() => list.classList.remove('open'), 150));
}

/* ══ IBP badge ══ */
document.getElementById('ibp').addEventListener('input', function() {
  const badge = document.getElementById('ibp-badge');
  const info  = niveauIBP(this.value);
  if (!info) { badge.className = 'ibp-badge'; return; }
  badge.textContent = info.label;
  badge.style.background = info.bg;
  badge.style.color = info.color;
  badge.className = 'ibp-badge visible';
});

function niveauIBP(v) {
  const n = parseFloat(v);
  if (isNaN(n) || v === '') return null;
  if (n <= 25)  return { label: '🟢 N1 — Facile',          bg: '#d4edda', color: '#155724' };
  if (n <= 50)  return { label: '🔵 N2 — Assez Facile',    bg: '#cce5ff', color: '#004085' };
  if (n <= 75)  return { label: '🟡 N3 — Peu Difficile',   bg: '#fff3cd', color: '#856404' };
  if (n <= 100) return { label: '🔴 N4 — Assez Difficile', bg: '#f8d7da', color: '#721c24' };
  return              { label: '⚫ N5 — Difficile',         bg: '#343a40', color: '#ffffff' };
}

/* ══ Onglets ══ */
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

/* ══ Toast ══ */
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => t.className = '', 3500);
}

/* ══ Appel Apps Script ══ */
async function callScript(params) {
  const res = await fetch(SCRIPT_URL + '?' + new URLSearchParams(params).toString());
  return res.json();
}

function setBusy(btnId, busy) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (busy) { btn.dataset.label = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> En cours…'; }
  else btn.innerHTML = btn.dataset.label;
  btn.disabled = busy;
}

/* ══ CRÉER ══ */
async function creerRando() {
  const date      = document.getElementById('date').value;
  const nom       = document.getElementById('nom-input').value.trim();
  const animateur = document.getElementById('animateur-input').value.trim();
  const ibp       = document.getElementById('ibp').value.trim();
  const distance  = document.getElementById('distance').value.trim();
  const denivele  = document.getElementById('denivele').value.trim();
  if (!date || !nom || !animateur) { showToast('Veuillez remplir les champs obligatoires (*)', true); return; }
  setBusy('btn-create', true);
  try {
    const res = await callScript({ action:'add', date, nom, animateur, ibp, distance, denivele });
    if (res.success) {
      showToast('✅ Randonnée créée dans Sheets et Calendar !');
      ['ibp','distance','denivele'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('nom-input').value = '';
      document.getElementById('animateur-input').value = '';
      document.getElementById('ibp-badge').className = 'ibp-badge';
      /* Date suivante auto */
      const last = new Date(date + 'T12:00:00');
      const dow  = last.getDay();
      const next = new Date(last);
      next.setDate(last.getDate() + (dow === 1 ? 3 : dow === 4 ? 4 : 3));
      document.getElementById('date').value = next.toISOString().split('T')[0];
    } else {
      showToast('Erreur : ' + (res.error || 'inconnue'), true);
    }
  } catch(e) { showToast('Erreur réseau : ' + e.message, true); }
  setBusy('btn-create', false);
}

/* ══ CHARGER ══ */
async function loadEvents() {
  setBusy('btn-load', true);
  try {
    const res   = await callScript({ action: 'list' });
    const tbody = document.getElementById('events-body');
    tbody.innerHTML = '';
    const rows = res.rows || res.events || [];

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Aucun événement trouvé.</td></tr>';
    } else {
      // ── Tri croissant par date (au cas où Apps Script ne le fait pas) ──
      rows.sort((a, b) => {
        const ka = dateToSortKey(a.date);
        const kb = dateToSortKey(b.date);
        return ka < kb ? -1 : ka > kb ? 1 : 0;
      });

      rows.forEach(ev => {
        const tr = document.createElement('tr');
        const ej = JSON.stringify(ev).replace(/'/g, "&#39;");
        // Affichage de la date en JJ/MM/AAAA
        const dateAffichee = isoToDisplay(ev.date);
        tr.innerHTML = `
          <td>${dateAffichee}</td>
          <td><strong>${ev.nom || '—'}</strong></td>
          <td>${ev.animateur || '—'}</td>
          <td>${ev.ibp ? '<span class="badge">'+ev.ibp+'</span>' : '—'}</td>
          <td>${ev.distance ? '<span class="badge green">'+ev.distance+' km</span>' : '—'}</td>
          <td>${ev.denivele ? '<span class="badge green">'+ev.denivele+' m</span>' : '—'}</td>
          <td class="actions-cell">
            <button class="btn btn-edit"   onclick='openEdit(${ej})'>✏️ Modifier</button>
            <button class="btn btn-delete" onclick='confirmDelete(${ev.rowIndex},"${(ev.nom||'').replace(/"/g,'&quot;')}")'>❌ Annuler</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }
  } catch(e) { showToast('Erreur réseau lors du chargement.', true); }
  setBusy('btn-load', false);
}

/* ══ MODIFIER ══
   La modal utilise <input type="date"> qui attend du format ISO YYYY-MM-DD.
   On convertit la date reçue (quelle que soit sa forme) vers ISO pour le champ,
   puis on renvoie l'ISO au script.
*/
function openEdit(ev) {
  document.getElementById('edit-rowIndex').value  = ev.rowIndex;
  document.getElementById('edit-date').value      = displayToIso(ev.date) || '';
  document.getElementById('edit-nom').value       = ev.nom       || '';
  document.getElementById('edit-animateur').value = ev.animateur || '';
  document.getElementById('edit-ibp').value       = ev.ibp       || '';
  document.getElementById('edit-distance').value  = ev.distance  || '';
  document.getElementById('edit-denivele').value  = ev.denivele  || '';
  document.getElementById('modal-edit').classList.add('open');
}

async function saveEdit() {
  const rowIndex  = document.getElementById('edit-rowIndex').value;
  const date      = document.getElementById('edit-date').value;   // ISO YYYY-MM-DD
  const nom       = document.getElementById('edit-nom').value.trim();
  const animateur = document.getElementById('edit-animateur').value.trim();
  const ibp       = document.getElementById('edit-ibp').value.trim();
  const distance  = document.getElementById('edit-distance').value.trim();
  const denivele  = document.getElementById('edit-denivele').value.trim();
  if (!date || !nom || !animateur) { showToast('Champs obligatoires manquants.', true); return; }
  setBusy('btn-save-edit', true);
  try {
    const res = await callScript({ action:'update', rowIndex, date, nom, animateur, ibp, distance, denivele });
    if (res.success) {
      showToast('✅ Événement modifié dans Sheets et Calendar !');
      closeModal('modal-edit');
      loadEvents();
    } else showToast('Erreur : ' + (res.error || 'inconnue'), true);
  } catch(e) { showToast('Erreur réseau.', true); }
  setBusy('btn-save-edit', false);
}

/* ══ SUPPRIMER ══ */
function confirmDelete(rowIndex, nom) {
  if (!confirm('Annuler "' + nom + '" ?\nSera supprimé de Sheets ET de Google Calendar.')) return;
  deleteEvent(rowIndex);
}

async function deleteEvent(rowIndex) {
  try {
    const res = await callScript({ action:'delete', rowIndex });
    if (res.success) { showToast('🗑️ Événement supprimé.'); loadEvents(); }
    else showToast('Erreur : ' + (res.error || 'inconnue'), true);
  } catch(e) { showToast('Erreur réseau.', true); }
}

/* ══ Modal ══ */
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});

/* ══ Date par défaut : prochain lundi ══ */
const d0  = new Date();
const dow0 = d0.getDay();
